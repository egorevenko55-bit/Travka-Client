package com.travka.client.modules.render;

import com.travka.client.modules.Module;
import net.fabricmc.fabric.api.client.rendering.v1.WorldRenderEvents;
import net.minecraft.client.MinecraftClient;
import net.minecraft.client.render.BackgroundRenderer;
import net.minecraft.client.render.Camera;
import net.minecraft.client.render.FogShape;
import net.minecraft.client.render.GameRenderer;

public class FogModule extends Module {

    // Default: зелений туман в стилі Travka
    private float red   = 0.05f;
    private float green = 0.18f;
    private float blue  = 0.08f;

    // Густота: 0.0 = немає туману, 1.0 = дуже густий
    private float density = 0.3f;

    // Відстань початку та кінця туману (у блоках)
    private float fogStart = 10f;
    private float fogEnd   = 80f;

    public FogModule() {
        super("CustomFog", "Кастомний туман з регульованим кольором та густиною", Category.RENDER);
    }

    // ── Getters / Setters (для GUI в майбутньому) ──

    public void setColor(float r, float g, float b) {
        this.red   = Math.max(0, Math.min(1, r));
        this.green = Math.max(0, Math.min(1, g));
        this.blue  = Math.max(0, Math.min(1, b));
    }

    public void setDensity(float density) {
        this.density = Math.max(0f, Math.min(1f, density));
        // Перераховуємо відстані на основі густоти
        this.fogStart = 5f + (1f - density) * 120f;
        this.fogEnd   = fogStart + 60f + (1f - density) * 60f;
    }

    public float[] getColor() { return new float[]{red, green, blue}; }
    public float getDensity() { return density; }
    public float getFogStart() { return fogStart; }
    public float getFogEnd() { return fogEnd; }

    // ── Presets ──

    public void applyPreset(FogPreset preset) {
        switch (preset) {
            case TRAVKA_GREEN -> { setColor(0.05f, 0.18f, 0.08f); setDensity(0.3f); }
            case NIGHT_PURPLE -> { setColor(0.08f, 0.02f, 0.15f); setDensity(0.5f); }
            case DESERT_SAND  -> { setColor(0.55f, 0.42f, 0.18f); setDensity(0.25f); }
            case OCEAN_BLUE   -> { setColor(0.03f, 0.12f, 0.35f); setDensity(0.6f); }
            case BLOOD_RED    -> { setColor(0.35f, 0.02f, 0.02f); setDensity(0.55f); }
            case CLEAN        -> { setColor(0f, 0f, 0f); setDensity(0f); }
        }
    }

    public enum FogPreset {
        TRAVKA_GREEN,
        NIGHT_PURPLE,
        DESERT_SAND,
        OCEAN_BLUE,
        BLOOD_RED,
        CLEAN
    }
}
